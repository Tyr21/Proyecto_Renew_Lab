name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Build and test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust workspace (~/.cargo + target)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Check version coherence
        run: npm run release:check

      - name: Lint frontend (ESLint)
        run: npm run lint

      - name: Check frontend formatting (Prettier)
        run: npm run format:check

      - name: Run frontend tests (Vitest)
        run: npm test

      - name: Build frontend (tsc + Vite)
        run: npm run build

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Run Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

  release-build:
    name: Build Tauri installers (release)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust workspace (~/.cargo + target)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: release

      - name: Install npm dependencies
        run: npm ci

      - name: Check version coherence
        run: npm run release:check

      - name: Build Tauri (MSI + NSIS)
        run: npm run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: tauri-installers-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
